<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerformOS Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0A0A0A;--surface:#111111;--border:#1E1E1E;--primary:#F0F0F5;--secondary:#9CA3AF;
--accent:#3B82F6;--accent-hover:#2563EB;--green:#22C55E;--yellow:#EAB308;--red:#EF4444;
--radius:12px;--transition:200ms ease;
--font-primary:'Aspekta','Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans',sans-serif;
--font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
html{background:var(--bg);color:var(--primary);font-family:var(--font-primary);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}

/* Header */
.header{padding:32px 0 24px;border-bottom:1px solid var(--border)}
.header h1{font-family:var(--font-primary);font-size:28px;font-weight:600;letter-spacing:-.5px;color:var(--primary)}
.header h1 em{font-style:normal;color:var(--accent)}
.header-meta{display:flex;align-items:center;gap:16px;margin-top:8px;flex-wrap:wrap}
.header-sub{color:var(--secondary);font-size:14px}
.badge{background:var(--accent);color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px}
.badge.update{background:var(--surface);color:var(--secondary);border:1px solid var(--border)}

/* Filter bar */
.filters{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 0;margin-bottom:28px}
.filters-inner{display:flex;align-items:center;gap:14px;flex-wrap:row}
.filter-group{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-label{color:var(--secondary);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;margin-right:4px}
.filter-btn{background:var(--surface);color:var(--secondary);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--primary)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn.active:hover{background:var(--accent-hover)}

/* Score slider */
.score-group{display:flex;align-items:center;gap:10px;margin-left:auto}
.score-group input[type=range]{-webkit-appearance:none;appearance:none;width:140px;height:4px;background:var(--border);border-radius:2px;outline:none}
.score-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 2px var(--accent)}
.score-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);min-width:32px;text-align:right}
.count-val{color:var(--secondary);font-size:12px}

/* Search */
.search-wrap{position:relative;flex:0 0 220px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--primary);padding:7px 12px 7px 34px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border var(--transition)}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--secondary);opacity:.6}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--secondary);pointer-events:none;font-size:14px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-bottom:48px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;gap:12px;transition:all var(--transition);position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:#2a2a2a}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.score-badge{flex-shrink:0;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#000;position:relative}
.score-badge::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--border);opacity:0;transition:opacity var(--transition)}
.card:hover .score-badge::after{opacity:1}
.score-badge.high{background:var(--green)}
.score-badge.mid{background:var(--yellow)}
.score-badge.low{background:var(--red)}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:6px;border:1px solid}
.tag.llm{background:rgba(139,92,246,.15);color:#a78bfa;border-color:rgba(139,92,246,.3)}
.tag.agents{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.tag.private_ai{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.3)}
.tag.local_models{background:rgba(245,158,11,.15);color:#fbbf24;border-color:rgba(245,158,11,.3)}
.tag.automation{background:rgba(236,72,153,.15);color:#f472b6;border-color:rgba(236,72,153,.3)}
.tag.general_ai{color:var(--secondary);border-color:var(--border);background:rgba(156,163,175,.08)}
.tag.gpu,.tag.ai_inference,.tag.ollama,.tag.hermes,.tag.default{color:var(--secondary);border-color:var(--border);background:rgba(156,163,175,.08)}
.card-body{flex:1}
.card-title{font-family:var(--font-primary);font-size:17px;font-weight:700;line-height:1.35;letter-spacing:-.2px;margin-bottom:6px}
.card-summary{color:var(--secondary);font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-bottom{display:flex;align-items:center;justify-content-between;margin-top:4px;flex-wrap:wrap;gap:10px}
.card-meta{display:flex;align-items:center;gap:8px}
.sentiment-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sentiment-dot.positive{background:var(--green)}
.sentiment-dot.neutral{background:#6b7280}
.sentiment-dot.negative{background:var(--red)}
.sentiment-label{font-size:12px;color:var(--secondary);text-transform:capitalize}

/* Card actions */
.card-actions{display:flex;align-items:center;gap:6px}
.btn-read{background:transparent;color:var(--accent);border:1px solid var(--accent);padding:5px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition);white-space:nowrap}
.btn-read:hover{background:var(--accent);color:#fff}
.rate-btn{background:none;border:1px solid var(--border);color:var(--secondary);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);font-size:15px}
.rate-btn:hover{border-color:var(--accent);color:var(--primary)}
.rate-btn.active-up{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.rate-btn.active-down{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1)}

/* Footer */
.footer{border-top:1px solid var(--border);padding:24px 0;text-align:center;color:var(--secondary);font-size:12px}

/* Responsive */
@media(max-width:960px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
.grid{grid-template-columns:1fr}
.filters-inner{flex-direction:column;align-items:stretch}
.search-wrap{flex:none}
.score-group{margin-left:0}
.score-group input[type=range]{width:100%}
.wrap{padding:0 16px}
.header h1{font-size:24px}
}
</style>
</head>

var STORAGE_KEY = "performos-trending-ratings";

function loadRatings() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveRatings(ratings) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings)); } catch(e) {}
}

function getTagClass(tag) {

  if (t === "agents" || t === "agent") return "agents";
  if (t === "private_ai" || t === "private ai") return "private_ai";

  if (t === "automation") return "automation";
  if (t === "general_ai" || t === "general ai") return "general_ai";
  return "default";
}

  if (t === "gpu") return "GPU";
  if (t === "ollama") return "Ollama";
  if (t === "hermes") return "Hermes";
  if (t === "llm") return "LLM";
  if (t === "agents" || t === "agent") return "Agents";
  if (t === "private_ai") return "Private AI";
  if (t === "local_models") return "Local Models";
  if (t === "automation") return "Automation";
  if (t === "general_ai") return "General AI";
  return tag;
}

function matchesTopic(story, topic) {
  if (topic === "all") return true;
  var t = topic.toLowerCase();
  for (var i = 0; i < story.topic_tags.length; i++) {
    var tag = story.topic_tags[i].toLowerCase().replace(/\s+/g, "_");
    if (tag === t) return true;
  }
  return false;
}

function getEffectiveScore(story, ratings) {
  var r = ratings[story.id];
  if (r && r.manual_score != null) return r.manual_score;
  if (story.manual_score != null) return story.manual_score;
  return story.auto_score;
}

// Set last updated
var dates = RAW_DATA.map(function(s){ return new Date(s.scraped_at); });
dates.sort(function(a,b){ return b-a; });
var lastDate = dates[0];
document.getElementById("last-updated").textContent = "Updated " + lastDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

// State
var state = { topic: "all", sentiment: "all", minScore: 1, search: "" };
var ratings = loadRatings();

// Wire filters
function wireFilterButtons(containerId, attr, stateKey) {
  var container = document.getElementById(containerId);
  var buttons = container.querySelectorAll(".filter-btn");
  buttons.forEach(function(btn) {
    btn.addEventListener("click", function() {
      buttons.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state[stateKey] = btn.getAttribute(attr);
      render();
    });
  });
}
wireFilterButtons("topic-filters", "data-topic", "topic");
wireFilterButtons("sentiment-filters", "data-sentiment", "sentiment");

var slider = document.getElementById("score-slider");
var scoreVal = document.getElementById("score-val");
slider.addEventListener("input", function() {
  state.minScore = parseInt(this.value);
  scoreVal.textContent = state.minScore;
  render();
});

var searchInput = document.getElementById("search-input");
var searchDebounce = null;
searchInput.addEventListener("input", function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    state.search = searchInput.value.toLowerCase().trim();
    render();
  }, 150);
});

// Escape HTML
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Render
function render() {
  var grid = document.getElementById("grid");
  var countVal = document.getElementById("count-val");
  var visible = 0;
  var cards = [];

  for (var i = 0; i < RAW_DATA.length; i++) {
    var story = RAW_DATA[i];

    // Topic filter
    if (!matchesTopic(story, state.topic)) continue;

    // Sentiment filter
    if (state.sentiment !== "all" && story.sentiment !== state.sentiment) continue;

    // Score filter
    var score = getEffectiveScore(story, ratings);
    if (score < state.minScore) continue;

    // Search filter
    if (state.search) {
      var haystack = (story.title + " " + story.summary).toLowerCase();
      if (haystack.indexOf(state.search) === -1) continue;
    }

    visible++;
    var r = ratings[story.id] || {};
    var ratedGood = r.rated_good != null ? r.rated_good : story.rated_good;
    var ratedBad = r.rated_bad != null ? r.rated_bad : story.rated_bad;

    // Score badge class
    var scoreClass = score >= 80 ? "high" : (score >= 50 ? "mid" : "low");

    // Tags HTML
    var tagsHtml = "";
    for (var j = 0; j < story.topic_tags.length; j++) {
      var tag = story.topic_tags[j];
      tagsHtml += '<span class="tag ' + getTagClass(tag) + '">' + esc(getTagLabel(tag)) + '</span>';
    }

    // Sentiment HTML
    var sentHtml = '<span class="sentiment-dot ' + story.sentiment + '"></span><span class="sentiment-label">' + story.sentiment + '</span>';

    // Score display - show manual if modified
    var adjScore = r && r.manual_score != null ? r.manual_score : score;

    // Rating buttons
    var upClass = ratedGood === true ? "rate-btn active-up" : "rate-btn";
    var downClass = ratedBad === true ? "rate-btn active-down" : "rate-btn";

    cards.push(
      '<article class="card" data-id="' + story.id + '">' +
        '<div class="card-top">' +
          '<div class="tags">' + tagsHtml + '</div>' +
          '<div class="score-badge ' + scoreClass + '">' + adjScore + '</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<h2 class="card-title">' + esc(story.title) + '</h2>' +
          '<p class="card-summary">' + esc(story.summary) + '</p>' +
        '</div>' +
        '<div class="card-bottom">' +
          '<div class="card-meta">' + sentHtml + '</div>' +
          '<div class="card-actions">' +
            '<a class="btn-read" href="' + esc(story.link) + '" target="_blank" rel="noopener">Read</a>' +
            '<button class="' + upClass + '" data-action="up" data-story="' + story.id + '" title="Thumbs up">&#11014;</button>' +
            '<button class="' + downClass + '" data-action="down" data-story="' + story.id + '" title="Thumbs down">&#11015;</button>' +
          '</div>' +
        '</div>' +
      '</article>'
    );
  }

  grid.innerHTML = cards.join("");
  countVal.textContent = visible + " of " + RAW_DATA.length + " stories";

  // Wire rating buttons
  grid.querySelectorAll(".rate-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var storyId = this.getAttribute("data-story");
      var action = this.getAttribute("data-action");
      var story = null;
      for (var k = 0; k < RAW_DATA.length; k++) {
        if (RAW_DATA[k].id === storyId) { story = RAW_DATA[k]; break; }
      }
      if (!story) return;

      if (!ratings[storyId]) {
        ratings[storyId] = { rated_good: null, rated_bad: null, manual_score: null };
      }

      if (action === "up") {
        ratings[storyId].rated_good = true;
        ratings[storyId].rated_bad = false;
        ratings[storyId].manual_score = story.auto_score + 10;
        if (ratings[storyId].manual_score > 100) ratings[storyId].manual_score = 100;
      } else {
        ratings[storyId].rated_good = false;
        ratings[storyId].rated_bad = true;
        ratings[storyId].manual_score = story.auto_score - 10;
        if (ratings[storyId].manual_score < 1) ratings[storyId].manual_score = 1;
      }

      saveRatings(ratings);
      render();
    });
  });
}

render();
</script>
</body>
</html>
