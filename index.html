<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerformOS Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;--bg-elevated:#0d0d10;--surface:#121214;--surface-hover:#18181c;
  --border:#1c1c20;--border-hover:#2a2a32;
  --primary:#f0f0f5;--secondary:#71717a;--tertiary:#52525b;
  --accent:#3b82f6;--accent-dim:#3b82f620;--accent-glow:#3b82f650;
  --green:#22c55e;--green-dim:#22c55e20;--yellow:#eab308;--yellow-dim:#eab30820;
  --red:#ef4444;--red-dim:#ef444420;
  --radius-sm:8px;--radius:14px;--radius-lg:20px;
  --transition-fast:150ms cubic-bezier(0.4,0,0.2,1);
  --transition:250ms cubic-bezier(0.4,0,0.2,1);
  --transition-slow:400ms cubic-bezier(0.16,1,0.3,1);
  --font-primary:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
html{background:var(--bg);color:var(--primary);font-family:var(--font-primary);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{min-height:100vh}

/* Noise grain overlay */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px 256px}

/* Subtle radial gradient background */
body::after{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,.06),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(34,197,94,.03),transparent 50%)}

.wrap{max-width:1320px;margin:0 auto;padding:0 28px}

/* ── Editorial Header ── */
.header{padding:40px 0 28px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-title-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.header h1{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--primary)}
.header h1 span{color:var(--accent)}
.header-live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);position:relative;flex-shrink:0}
.header-live-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--green);opacity:.4;animation:pulse-ring 2s cubic-bezier(0.4,0,0.6,1) infinite}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.4);opacity:0}}
.header-kicker{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.8px;color:var(--tertiary);margin-bottom:6px}
.header-sub{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.header-desc{color:var(--secondary);font-size:13px;font-weight:400}
.header-stats{display:flex;align-items:center;gap:8px}
.stat-pill{background:var(--surface);border:1px solid var(--border);color:var(--secondary);font-family:var(--font-mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.5px;transition:all var(--transition)}
.stat-pill:hover{border-color:var(--border-hover);color:var(--primary)}
.stat-pill .num{color:var(--accent);font-weight:700}
.stat-pill.time-pill{background:var(--surface);border:1px solid var(--border)}
.stat-pill.time-pill .time-val{color:var(--primary);font-weight:600}

/* ── Filter Bar ── */
.filters{position:sticky;top:0;z-index:50;background:rgba(8,8,10,.85);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid var(--border);padding:14px 0;margin-bottom:36px}
.filters-inner{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters-inner::-webkit-scrollbar{display:none}
.filter-group{display:flex;align-items:center;gap:6px;flex-shrink:0}
.filter-label{color:var(--tertiary);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;white-space:nowrap;padding-right:2px}
.filter-btn{background:transparent;color:var(--tertiary);border:1px solid transparent;padding:7px 14px;border-radius:20px;font-family:var(--font-primary);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;position:relative}
.filter-btn:hover{color:var(--primary);background:rgba(255,255,255,.03)}
.filter-btn.active{background:rgba(59,130,246,.1);color:var(--accent);border-color:rgba(59,130,246,.2)}
.filter-btn.active:hover{background:rgba(59,130,246,.15)}

/* Score Slider */
.score-group{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.score-group input[type=range]{-webkit-appearance:none;appearance:none;width:120px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.score-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 3px var(--accent-dim);transition:all var(--transition-fast)}
.score-group input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px var(--accent-dim);transform:scale(1.1)}
.score-val{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);min-width:26px;text-align:right;letter-spacing:0}
.count-val{color:var(--tertiary);font-size:11px;flex-shrink:0}

/* Search */
.search-wrap{position:relative;flex:0 0 200px}
.search-wrap input{width:100%;background:transparent;border:1px solid var(--border);color:var(--primary);padding:7px 12px 7px 34px;border-radius:20px;font-family:var(--font-primary);font-size:12px;outline:none;transition:all var(--transition)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-wrap input::placeholder{color:var(--tertiary)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tertiary);pointer-events:none;font-size:13px;line-height:1}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-bottom:64px}

/* ── Card ── */
.card{background:var(--surface);border:1px solid transparent;border-radius:var(--radius);padding:24px 24px 20px;display:flex;flex-direction:column;gap:14px;transition:all var(--transition-slow);position:relative;opacity:0;transform:translateY(20px);will-change:transform,opacity}
.card.visible{opacity:1;transform:translateY(0)}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);border:1px solid var(--border);transition:all var(--transition);pointer-events:none}
.card:hover{transform:translateY(-6px);background:var(--surface-hover);box-shadow:0 20px 60px -15px rgba(0,0,0,.5),0 0 0 1px rgba(59,130,246,.08);border-color:transparent}
.card:hover::before{border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 0 30px rgba(59,130,246,.04)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.tags{display:flex;flex-wrap:wrap;gap:5px;flex:1;min-width:0}

/* Score Badge */
.score-badge{flex-shrink:0;width:46px;height:46px;position:relative;display:flex;align-items:center;justify-content:center}
.score-ring{position:absolute;inset:0;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:2.5}
.score-ring .track{stroke:var(--border);opacity:.6}
.score-ring .progress{stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)}
.score-number{position:relative;font-family:var(--font-mono);font-size:13px;font-weight:700;z-index:1}
.score-badge.high .score-ring .progress{stroke:var(--green)}
.score-badge.high .score-number{color:var(--green)}
.score-badge.mid .score-ring .progress{stroke:var(--yellow)}
.score-badge.mid .score-number{color:var(--yellow)}
.score-badge.low .score-ring .progress{stroke:var(--red)}
.score-badge.low .score-number{color:var(--red)}
.card:hover .score-badge{filter:drop-shadow(0 0 6px rgba(59,130,246,.2))}
.card:hover .score-badge.high{filter:drop-shadow(0 0 6px rgba(34,197,94,.2))}
.card:hover .score-badge.low{filter:drop-shadow(0 0 6px rgba(239,68,68,.15))}

/* Tags */
.tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:6px;border:1px solid;transition:all var(--transition-fast);white-space:nowrap}
.tag:hover{transform:translateY(-1px)}
.tag.llm{background:rgba(59,130,246,.08);color:#7eb8ff;border-color:rgba(59,130,246,.15)}
.tag.llm:hover{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.25)}
.tag.agents{background:rgba(139,92,246,.08);color:#b4a0ff;border-color:rgba(139,92,246,.15)}
.tag.agents:hover{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.25)}
.tag.private_ai{background:rgba(34,197,94,.08);color:#5eeab8;border-color:rgba(34,197,94,.15)}
.tag.private_ai:hover{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.25)}
.tag.local_models{background:rgba(245,158,11,.08);color:#fbbf24;border-color:rgba(245,158,11,.15)}
.tag.local_models:hover{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.25)}
.tag.automation{background:rgba(236,72,153,.08);color:#f9a8d4;border-color:rgba(236,72,153,.15)}
.tag.automation:hover{background:rgba(236,72,153,.12);border-color:rgba(236,72,153,.25)}
.tag.general_ai{color:var(--secondary);border-color:var(--border);background:rgba(156,163,175,.04)}
.tag.general_ai:hover{background:rgba(156,163,175,.08);border-color:var(--border-hover)}
.tag.gpu,.tag.ai_inference,.tag.ollama,.tag.hermes,.tag.default{color:var(--secondary);border-color:var(--border);background:rgba(156,163,175,.04)}
.tag.gpu:hover,.tag.ai_inference:hover,.tag.ollama:hover,.tag.hermes:hover,.tag.default:hover{background:rgba(156,163,175,.08);border-color:var(--border-hover)}

/* Card Body */
.card-body{flex:1;display:flex;flex-direction:column;gap:8px}
.card-title{font-family:var(--font-primary);font-size:16px;font-weight:600;line-height:1.35;letter-spacing:-.01em;transition:color var(--transition-fast)}
.card:hover .card-title{color:#fff}
.card-summary{color:var(--secondary);font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;max-width:60ch}

/* Card Bottom */
.card-bottom{display:flex;align-items:center;justify-content-between;margin-top:6px;flex-wrap:wrap;gap:10px}
.card-meta{display:flex;align-items:center;gap:7px}
.sentiment-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;position:relative}
.sentiment-dot.positive{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.3)}
.sentiment-dot.neutral{background:var(--tertiary);box-shadow:0 0 6px rgba(113,113,122,.2)}
.sentiment-dot.negative{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,.3)}
.sentiment-label{font-size:11px;color:var(--secondary);text-transform:capitalize;font-weight:500}

/* Card Actions */
.card-actions{display:flex;align-items:center;gap:5px}
.btn-read{background:transparent;color:var(--accent);border:1px solid rgba(59,130,246,.2);padding:6px 14px;border-radius:8px;font-family:var(--font-primary);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition);white-space:nowrap;letter-spacing:.2px}
.btn-read:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-read:active{transform:translateY(0) scale(.97)}
.rate-btn{background:transparent;border:1px solid var(--border);color:var(--tertiary);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition-fast);font-size:13px;line-height:1}
.rate-btn:hover{border-color:var(--border-hover);color:var(--primary);background:rgba(255,255,255,.02)}
.rate-btn:active{transform:scale(.92)}
.rate-btn.active-up{border-color:var(--green);color:var(--green);background:var(--green-dim);box-shadow:0 0 8px rgba(34,197,94,.1)}
.rate-btn.active-up:hover{background:rgba(34,197,94,.15);box-shadow:0 0 12px rgba(34,197,94,.15)}
.rate-btn.active-down{border-color:var(--red);color:var(--red);background:var(--red-dim);box-shadow:0 0 8px rgba(239,68,68,.1)}
.rate-btn.active-down:hover{background:rgba(239,68,68,.15);box-shadow:0 0 12px rgba(239,68,68,.15)}

/* Footer */
.footer{border-top:1px solid var(--border);padding:20px 0 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-text{color:var(--tertiary);font-size:11px}
.footer-brand{color:var(--secondary);font-family:var(--font-primary);font-size:11px;font-weight:600;letter-spacing:.3px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* ── Responsive ── */
@media(min-width:961px){
  .filters-inner{flex-wrap:wrap}
}
@media(max-width:960px){
  .grid{grid-template-columns:repeat(2,1fr);gap:16px}
}
@media(max-width:640px){
  .grid{grid-template-columns:1fr;gap:14px;padding-bottom:40px}
  .wrap{padding:0 16px}
  .header{padding:28px 0 20px}
  .header h1{font-size:22px}
  .header-top{flex-direction:column;gap:8px}
  .header-desc{font-size:12px}
  .filters-inner{gap:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter-label{display:none}
  .score-group{margin-left:0}
  .score-group input[type=range]{width:80px}
  .search-wrap{flex:0 0 140px}
  .filter-btn{padding:6px 11px;font-size:11px}
  .card{padding:18px}
  .card-title{font-size:15px}
  .card-summary{font-size:12px;-webkit-line-clamp:2}
  .score-badge{width:40px;height:40px}
  .score-number{font-size:12px}
  .footer{padding:16px 0 32px}
}

/* Selection */
::selection{background:rgba(59,130,246,.25);color:var(--primary)}

/* Focus visible */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.filter-btn:focus-visible,.rate-btn:focus-visible,.btn-read:focus-visible{outline-offset:1px}
</style>
</head>

<div class="header wrap">
  <div class="header-top">
    <div>
      <div class="header-kicker">PerformOS Intelligence</div>
      <h1>Trending <span>AI Pulse</span></h1>
      <div class="header-sub">
        <span class="header-desc">Scored stories, curated for relevance to the AI landscape</span>
      </div>
    </div>
    <div class="header-live-dot"></div>
  </div>
  <div class="header-stats">
    <span class="stat-pill"><span class="num" id="story-count">30</span> stories tracked</span>
    <span class="stat-pill time-pill" id="last-updated"></span>
    <span class="stat-pill">Updated live</span>
  </div>
</div>

<div class="filters">
  <div class="filters-inner wrap">
    <div class="filter-group" id="topic-filters">
      <span class="filter-label">Topic</span>
      <button class="filter-btn active" data-topic="all">All</button>
      <button class="filter-btn" data-topic="agents">Agents</button>
      <button class="filter-btn" data-topic="llm">LLM</button>
      <button class="filter-btn" data-topic="private_ai">Private AI</button>
      <button class="filter-btn" data-topic="local_models">Local Models</button>
      <button class="filter-btn" data-topic="automation">Automation</button>
      <button class="filter-btn" data-topic="general_ai">General AI</button>
    </div>
    <div class="filter-group" id="sentiment-filters">
      <span class="filter-label">Sentiment</span>
      <button class="filter-btn active" data-sentiment="all">All</button>
      <button class="filter-btn" data-sentiment="positive">Positive</button>
      <button class="filter-btn" data-sentiment="neutral">Neutral</button>
      <button class="filter-btn" data-sentiment="negative">Negative</button>
    </div>
    <div class="score-group">
      <span class="filter-label">Score</span>
      <input type="range" id="score-slider" min="1" max="100" value="1">
      <span class="score-val" id="score-val">1</span>
      <span class="count-val" id="count-val"></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="Search stories...">
    </div>
  </div>
</div>

<div class="grid wrap" id="grid"></div>

<div class="footer wrap">
  <span class="footer-text">Scores improve over time based on your ratings</span>
  <span class="footer-brand">PerformOS</span>
</div>

var STORAGE_KEY = "performos-trending-ratings";

function loadRatings() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveRatings(ratings) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings)); } catch(e) {}
}

function getTagClass(tag) {
  var t = tag.toLowerCase().replace(/\s+/g, "_");
  if (t === "llm") return "llm";
  if (t === "agents" || t === "agent") return "agents";
  if (t === "private_ai" || t === "private ai") return "private_ai";
  if (t === "local_models" || t === "local models") return "local_models";
  if (t === "automation") return "automation";
  if (t === "general_ai" || t === "general ai") return "general_ai";
  return "default";
}

function getTagLabel(tag) {
  var t = tag.toLowerCase().replace(/\s+/g, "_");
  if (t === "ai_inference") return "AI Inference";
  if (t === "gpu") return "GPU";
  if (t === "ollama") return "Ollama";
  if (t === "hermes") return "Hermes";
  if (t === "llm") return "LLM";
  if (t === "agents" || t === "agent") return "Agents";
  if (t === "private_ai") return "Private AI";
  if (t === "local_models") return "Local Models";
  if (t === "automation") return "Automation";
  if (t === "general_ai") return "General AI";
  return tag;
}

function matchesTopic(story, topic) {
  if (topic === "all") return true;
  var t = topic.toLowerCase();
  for (var i = 0; i < story.topic_tags.length; i++) {
    var tag = story.topic_tags[i].toLowerCase().replace(/\s+/g, "_");
    if (tag === t) return true;
  }
  return false;
}

function getEffectiveScore(story, ratings) {
  var r = ratings[story.id];
  if (r && r.manual_score != null) return r.manual_score;
  if (story.manual_score != null) return story.manual_score;
  return story.auto_score;
}

// Relative time formatter
function timeAgo(date) {
  var now = new Date();
  var diff = Math.floor((now - date) / 1000);
  if (diff < 60) return "just now";
  if (diff < 3600) { var m = Math.floor(diff / 60); return m + " min" + (m > 1 ? "s" : "") + " ago"; }
  if (diff < 86400) { var h = Math.floor(diff / 3600); return h + " hr" + (h > 1 ? "s" : "") + " ago"; }
  if (diff < 172800) return "yesterday";
  var d = Math.floor(diff / 86400);
  return d + " days ago";
}

// Set last updated with relative time
var dates = RAW_DATA.map(function(s){ return new Date(s.scraped_at); });
dates.sort(function(a,b){ return b - a; });
var lastDate = dates[0];
var lastUpdatedEl = document.getElementById("last-updated");
lastUpdatedEl.textContent = "Updated " + timeAgo(lastDate);

// Update relative time display every 60s
setInterval(function() {
  lastUpdatedEl.textContent = "Updated " + timeAgo(lastDate);
}, 60000);

// State
var state = { topic: "all", sentiment: "all", minScore: 1, search: "" };
var ratings = loadRatings();

// Wire filters
function wireFilterButtons(containerId, attr, stateKey) {
  var container = document.getElementById(containerId);
  var buttons = container.querySelectorAll(".filter-btn");
  buttons.forEach(function(btn) {
    btn.addEventListener("click", function() {
      buttons.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state[stateKey] = btn.getAttribute(attr);
      render();
    });
  });
}
wireFilterButtons("topic-filters", "data-topic", "topic");
wireFilterButtons("sentiment-filters", "data-sentiment", "sentiment");

var slider = document.getElementById("score-slider");
var scoreVal = document.getElementById("score-val");
slider.addEventListener("input", function() {
  state.minScore = parseInt(this.value);
  scoreVal.textContent = state.minScore;
  render();
});

var searchInput = document.getElementById("search-input");
var searchDebounce = null;
searchInput.addEventListener("input", function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    state.search = searchInput.value.toLowerCase().trim();
    render();
  }, 200);
});

// Escape HTML
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Build score ring SVG
function scoreRing(score, scoreClass) {
  var circumference = 2 * Math.PI * 18;
  var offset = circumference - (score / 100) * circumference;
  return '<div class="score-badge ' + scoreClass + '">' +
    '<svg class="score-ring" width="46" height="46" viewBox="0 0 46 46">' +
      '<circle class="track" cx="23" cy="23" r="18"/>' +
      '<circle class="progress" cx="23" cy="23" r="18" ' +
        'stroke-dasharray="' + circumference + '" ' +
        'stroke-dashoffset="' + offset + '"/>' +
    '</svg>' +
    '<span class="score-number">' + score + '</span>' +
  '</div>';
}

// Staggered entrance animation
function animateCards() {
  var cards = document.querySelectorAll(".card");
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        requestAnimationFrame(function() {
          entry.target.classList.add("visible");
        });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: "0px 0px 20px 0px" });
  cards.forEach(function(card) {
    observer.observe(card);
  });
}

// Render
function render() {
  var grid = document.getElementById("grid");
  var countVal = document.getElementById("count-val");
  var visible = 0;
  var cards = [];

  for (var i = 0; i < RAW_DATA.length; i++) {
    var story = RAW_DATA[i];

    if (!matchesTopic(story, state.topic)) continue;
    if (state.sentiment !== "all" && story.sentiment !== state.sentiment) continue;

    var score = getEffectiveScore(story, ratings);
    if (score < state.minScore) continue;

    if (state.search) {
      var haystack = (story.title + " " + story.summary).toLowerCase();
      if (haystack.indexOf(state.search) === -1) continue;
    }

    visible++;
    var r = ratings[story.id] || {};
    var ratedGood = r.rated_good != null ? r.rated_good : story.rated_good;
    var ratedBad = r.rated_bad != null ? r.rated_bad : story.rated_bad;

    var scoreClass = score >= 80 ? "high" : (score >= 50 ? "mid" : "low");

    var tagsHtml = "";
    for (var j = 0; j < story.topic_tags.length; j++) {
      var tag = story.topic_tags[j];
      tagsHtml += '<span class="tag ' + getTagClass(tag) + '">' + esc(getTagLabel(tag)) + '</span>';
    }

    var sentHtml = '<span class="sentiment-dot ' + story.sentiment + '"></span><span class="sentiment-label">' + story.sentiment + '</span>';

    var adjScore = r && r.manual_score != null ? r.manual_score : score;

    var upClass = ratedGood === true ? "rate-btn active-up" : "rate-btn";
    var downClass = ratedBad === true ? "rate-btn active-down" : "rate-btn";

    cards.push(
      '<article class="card" data-id="' + story.id + '">' +
        '<div class="card-top">' +
          '<div class="tags">' + tagsHtml + '</div>' +
          scoreRing(adjScore, scoreClass) +
        '</div>' +
        '<div class="card-body">' +
          '<h2 class="card-title">' + esc(story.title) + '</h2>' +
          '<p class="card-summary">' + esc(story.summary) + '</p>' +
        '</div>' +
        '<div class="card-bottom">' +
          '<div class="card-meta">' + sentHtml + '</div>' +
          '<div class="card-actions">' +
            '<a class="btn-read" href="' + esc(story.link) + '" target="_blank" rel="noopener">Read story</a>' +
            '<button class="' + upClass + '" data-action="up" data-story="' + story.id + '" title="Thumbs up" aria-label="Rate this story up">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>' +
            '</button>' +
            '<button class="' + downClass + '" data-action="down" data-story="' + story.id + '" title="Thumbs down" aria-label="Rate this story down">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 2l1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 1 1-2 2h-3"/></svg>' +
            '</button>' +
          '</div>' +
        '</div>' +
      '</article>'
    );
  }

  grid.innerHTML = cards.join("");
  countVal.textContent = visible + " of " + RAW_DATA.length;

  // Wire rating buttons
  grid.querySelectorAll(".rate-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var storyId = this.getAttribute("data-story");
      var action = this.getAttribute("data-action");
      var story = null;
      for (var k = 0; k < RAW_DATA.length; k++) {
        if (RAW_DATA[k].id === storyId) { story = RAW_DATA[k]; break; }
      }
      if (!story) return;

      if (!ratings[storyId]) {
        ratings[storyId] = { rated_good: null, rated_bad: null, manual_score: null };
      }

      if (action === "up") {
        ratings[storyId].rated_good = true;
        ratings[storyId].rated_bad = false;
        ratings[storyId].manual_score = story.auto_score + 10;
        if (ratings[storyId].manual_score > 100) ratings[storyId].manual_score = 100;
      } else {
        ratings[storyId].rated_good = false;
        ratings[storyId].rated_bad = true;
        ratings[storyId].manual_score = story.auto_score - 10;
        if (ratings[storyId].manual_score < 1) ratings[storyId].manual_score = 1;
      }

      saveRatings(ratings);
      render();
    });
  });

  // Animate card entrances
  requestAnimationFrame(function() {
    requestAnimationFrame(animateCards);
  });
}

render();
</script>
